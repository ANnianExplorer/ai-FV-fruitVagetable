<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="../../plugins/element-ui/index.css"/>
    <link rel="stylesheet" href="../../styles/common.css"/>
    <link rel="stylesheet" href="../../styles/page.css"/>
</head>
<body>
<div class="dashboard-container" id="info-app">
    <div class="container">
        <div
                class="tableBar"
                style="display: inline-block"
        >
            <el-button
                    type="primary"
                    class="continue"
                    @click="addClass('class')"
            >
                + 添加通知
            </el-button>
        </div>
        <el-table
                :data="tableData"
                stripe
                class="tableBox"
        >
            <el-table-column
                    prop="name"
                    label="通知标题"
            />
            </el-table-column>

            <el-table-column
                    prop="createTime"
                    label="操作时间"
            >
                <template slot-scope="scope">
                    {{scope.row.createTime}}
                </template>
            </el-table-column>

            <el-table-column
                    label="操作"
                    width="160"
                    align="center"
            >
                <template slot-scope="scope">
                    <el-button
                            type="text"
                            size="small"
                            class="blueBug"
                            @click="queryHandle(scope.row)"
                    >
                        查询
                    </el-button>
                    <el-button
                            type="text"
                            size="small"
                            class="blueBug"
                            @click="sendHandle(scope.row)"
                    >
                        发布
                    </el-button>
                    <el-button
                            type="text"
                            size="small"
                            class="delBut non"
                            @click="deleteHandle(scope.row.id)"
                    >
                        删除
                    </el-button>
                </template>
            </el-table-column>
        </el-table>
        <el-pagination
                class="pageList"
                :page-sizes="[10, 20, 30, 40]"
                :page-size="pageSize"
                layout="total, sizes, prev, pager, next, jumper"
                :total="counts"
                @size-change="handleSizeChange"
                @current-change="handleCurrentChange"
        ></el-pagination>
    </div>
    <el-dialog
            :title="classData.title"
            :visible.sync="classData.dialogVisible"
            width="30%"
            :before-close="handleClose"
    >
        <el-form
                class="demo-form-inline"
                label-width="100px"
        >
            <el-form-item label="通知标题：">
                <el-input
                        v-model="classData.name"
                        placeholder="请输入通知标题"
                        maxlength="14"
                />
            </el-form-item>
            <el-form-item label="通知内容：">
                <el-input
                        v-model="classData.text"
                        type="textarea"
                        :rows="3"
                        placeholder="通知内容，最长200字"
                        maxlength="200"
                />
            </el-form-item>

        </el-form>
        <span
                slot="footer"
                class="dialog-footer"
        >
        <el-button
                size="medium"
                @click="classData.dialogVisible = false"
        >取 消</el-button>
        <el-button
                type="primary"
                size="medium"
                @click="submitForm()"
        >确 定</el-button>
        <el-button
                v-if="action != 'edit'"
                type="primary"
                size="medium"
                class="continue"
                @click="submitForm('go')"
        > 保存并继续添加 </el-button>
      </span>
    </el-dialog>
    <!-- 查看text弹框 -->
    <el-dialog
            :title="`通知标题：${diaForm.name}`"
            :visible.sync="classData.dialogVisible2"
            width="30%"
            :before-close="handleClose2"
    >
        <div class="info-box">
            <div class="item-box">
                <span class="label">内容：</span>
                <span class="des">{{ diaForm.text }}</span>
            </div>
        </div>
    </el-dialog>
</div>
<!-- 开发环境版本，包含了有帮助的命令行警告 -->
<script src="../../plugins/vue/vue.js"></script>
<!-- 引入组件库 -->
<script src="../../plugins/element-ui/index.js"></script>
<!-- 引入axios -->
<script src="../../plugins/axios/axios.min.js"></script>
<script src="../../js/request.js"></script>
<script src="../../api/info.js"></script>
<script>
    new Vue({
        el: '#info-app',
        data() {
            return {
                action: '',
                counts: 0,
                page: 1,
                pageSize: 10,
                tableData: [],
                diaForm: {},
                // type :'',
                classData: {
                    'title': '添加通知',
                    'dialogVisible': false,
                    'dialogVisible2': false,
                    'infoId': '',
                    'name': '',
                    'text': ''
                }
            }
        },
        computed: {},
        created() {
            this.init()
        },
        mounted() {
        },
        methods: {
            async init() {
                await getInfoPage({'page': this.page, 'pageSize': this.pageSize}).then(res => {
                    if (String(res.code) === '1') {
                        this.tableData = res.data.records
                        this.counts = Number(res.data.total)
                    } else {
                        this.$message.error(res.msg || '操作失败')
                    }
                }).catch(err => {
                    this.$message.error('请求出错了：' + err)
                })
            },
            handleQuery() {
                this.page = 1;
                this.init();
            },
            // 添加
            addClass(st) {
                if (st == 'class') {
                    this.classData.title = '添加优惠券'
                }
                this.action = 'add'
                this.classData.name = ''
                this.classData.dialogVisible = true
            },
            // 查询内容
            queryHandle(dat){
                //应该有一个弹窗显示信息
                this.diaForm = {}
                this.classData.dialogVisible2 = true
                this.diaForm = { ...dat }
            },
            //发送公告
            sendHandle(dat){
                //感觉应该是
            },
            // 关闭弹窗
            handleClose(st) {
                this.classData.dialogVisible = false
            },
            handleClose2(st) {
                this.classData.dialogVisible2 = false
            },
            //删除
            deleteHandle(id) {
                this.$confirm('此操作将永久删除该文件, 是否继续?', '提示', {
                    'confirmButtonText': '确定',
                    'cancelButtonText': '取消',
                    'type': 'warning'
                }).then(() => {
                    deleInfo(id).then(res => {
                        if (res.code === 1) {
                            this.$message.success('删除成功！')
                            this.handleQuery()
                        } else {
                            this.$message.error(res.msg || '操作失败')
                        }
                    }).catch(err => {
                        this.$message.error('请求出错了：' + err)
                    })
                })
            },
            //数据提交
            submitForm(st) {
                const classData = this.classData
                const valid = (classData.name === 0 || classData.name) && (classData.text === 0 || classData.text)
                if (this.action === 'add') {
                    if (valid) {
                        const reg = /^\d+$/
                        addInfo({'name': classData.name, 'text': classData.text}).then(res => {
                            console.log(res)
                            if (res.code === 1) {
                                this.$message.success('通知添加成功！')
                                if (!st) {
                                    this.classData.dialogVisible = false
                                } else {
                                    this.classData.name = ''
                                }
                                this.handleQuery()
                            } else {
                                this.$message.error(res.msg || '操作失败')
                            }
                        }).catch(err => {
                            this.$message.error('请求出错了：' + err)
                        })
                    } else {
                        this.$message.error('请输入通知名称或排序')
                    }
                }
            },
            handleSizeChange(val) {
                this.pageSize = val
                this.init()
            },
            handleCurrentChange(val) {
                this.page = val
                this.init()
            }
        }
    })
</script>
</body>
</html>
